# Deploy ONLY the web/worker (no APK) — for worker-route or PWA-only changes
# that can't wait for a full v* release. Manual trigger or push to main
# touching the worker/wrangler files.
name: web-deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['worker.js', 'wrangler.jsonc']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build web export
        run: npx expo export -p web
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
