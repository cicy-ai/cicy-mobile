# JS-only hot update (expo-updates OTA, self-hosted on the public R2 CDN).
# No gradle, no APK — ~3 minutes from tag to phones.
#
#   git tag u$(date +%Y%m%d%H%M) && git push origin u<That tag>
#
# Devices on the matching runtimeVersion pick it up on next app launch
# (checkAutomatically: ON_LOAD; applied the launch after download).
# Native changes NEVER ship this way — bump runtimeVersion + release a v* APK.
name: ota

on:
  push:
    tags: ['u*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      # The OTA bundle's expoClient config must carry the REAL app version
      # (repo app.json stays at a placeholder; releases sync it in-CI only).
      # Use the newest v* tag — that's the APK generation this JS runs on.
      - name: Sync version from latest release tag
        run: |
          git fetch --tags --quiet
          VER=$(git describe --tags --match 'v*' --abbrev=0 | sed 's/^v//')
          node scripts/sync-version.mjs "$VER"
      - name: Export update bundles (android + ios)
        run: npx expo export -p android -p ios
      - name: Publish OTA to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: node scripts/publish-ota.mjs "${GITHUB_REF_NAME}"

  # Keep the PWA / Telegram Mini App on the SAME JS as the native OTA train.
  # (Learned the hard way: u* tags used to update only native — web users sat
  # on days-old code and "fixed" bugs kept reproducing there.)
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Sync version from latest release tag
        run: |
          git fetch --tags --quiet
          VER=$(git describe --tags --match 'v*' --abbrev=0 | sed 's/^v//')
          node scripts/sync-version.mjs "$VER"
      - name: Build web export
        run: npx expo export -p web
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
