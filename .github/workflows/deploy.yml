# Tag-driven release. Push a v* tag and this:
#   1. builds the web export and deploys the assets-only Worker
#      (m.cicy-ai.com (+ telegram-bot alias, workers.dev))  — the Telegram Mini App / PWA;
#   2. builds a release Android APK and attaches it to a GitHub Release.
#
#   git tag v1.0.1 && git push origin v1.0.1
#
# Version: app.json `expo.version` is set from the tag (v1.0.1 → 1.0.1) and
# android `versionCode` from the run number, so every release is monotonic.
#
# Secrets (repo → Settings → Secrets):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID   (web deploy)
# The Android APK is debug-signed (installable for sideload / Telegram). For an
# upgradable / Play Store signature see README → Release.
name: release

on:
  push:
    tags: ['v*']
  # iOS is manual-only for now: macOS minutes bill at 10x on a private repo and
  # the unsigned-IPA build is still being validated, so it shouldn't run on every
  # release tag yet. Trigger it from the Actions tab with a version string.
  workflow_dispatch:
    inputs:
      ios_version:
        description: iOS build version (e.g. 1.0.3)
        required: true
        default: 0.0.0-dev

jobs:
  # ── Telegram Mini App / PWA → Cloudflare ─────────────────────────────────────
  web:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Set version from tag
        run: node scripts/sync-version.mjs "${GITHUB_REF_NAME#v}" "${{ github.run_number }}"
      - name: Build web export
        run: npx expo export -p web
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
      - name: Verify live bundle matches build
        run: |
          LOCAL=$(ls dist/_expo/static/js/web/ | grep '^entry')
          LIVE=$(curl -s https://m.cicy-ai.com/ | grep -o 'entry-[a-f0-9]*\.js' | head -1)
          echo "local=$LOCAL live=$LIVE"
          test "$LOCAL" = "$LIVE"

  # ── Android APK → GitHub Release ─────────────────────────────────────────────
  android:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload the APK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install deps
        run: npm ci
      - name: Set version from tag
        run: node scripts/sync-version.mjs "${GITHUB_REF_NAME#v}" "${{ github.run_number }}"
      - name: Prebuild native android project
        run: npx expo prebuild -p android --no-install
      # The prebuilt template signs the release APK with the throwaway debug
      # keystore — installable for sideload / Telegram distribution. For an
      # upgradable / Play Store signature, add a release keystore + signingConfig
      # (see README → Release).
      - name: Build release APK
        # expo-updates pushed the class count past the RN template's default
        # -XX:MaxMetaspaceSize=512m — the daemon OOMs on mergeExtDexRelease and
        # then HANGS (idle RMI thread), which looked like a 6h stuck build.
        # Duplicate keys in gradle.properties: last one wins.
        run: |
          printf '\norg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8\n' >> android/gradle.properties
          cd android && timeout 40m ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a,armeabi-v7a
      - name: Stage APK + zip-wrap
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/release/app-release.apk "cicy-${VER}.apk"
          # OSS blocks raw .apk on its bare domain (ApkDownloadForbidden). The
          # zip-wrapped APK is the ONLY artifact we publish (GitHub Release + OSS);
          # the raw .apk is never exposed. Phone downloads the zip, extracts, installs.
          zip -qj "cicy-${VER}.zip" "cicy-${VER}.apk"
          # Stable-name alias so GitHub Release has BOTH cicy-<ver>.zip and
          # cicy-latest.zip (releases/latest/download/cicy-latest.zip — the skill
          # contract). GitHub doesn't auto-alias; the softprops glob below picks
          # up both physical files.
          cp "cicy-${VER}.zip" cicy-latest.zip
          ls -lh "cicy-${VER}.zip" cicy-latest.zip
      - name: Publish GitHub Release (zip-wrapped APK)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: cicy-*.zip
      # Public download — the repo is private, so the GitHub Release isn't
      # reachable without auth. Primary CDN = Alibaba OSS (fast in mainland China;
      # R2/Cloudflare is slow / intermittently unreachable behind the GFW).
      # Public-read bucket cicy-1372193042-cn, same one cicy-desktop releases use.
      #
      # OSS blocks raw .apk on ANY *.aliyuncs.com endpoint (ApkDownloadForbidden
      # anti-abuse — mainland AND HK, public AND signed URL; only a bound CNAME
      # domain is exempt). We deliberately avoid binding a domain, so we wrap the
      # APK in an outer .zip: the zip's root isn't an APK, the content sniffer
      # lets it through, and it serves from the bare OSS domain. The phone
      # downloads cicy-*.zip and extracts the .apk to install.
      - name: Upload zip → OSS (bare domain, fast in CN)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          source scripts/oss-put.sh
          for key in "cicy-${VER}.zip" "cicy-latest.zip"; do
            oss_put "cicy-mobile/${key}" "cicy-${VER}.zip" application/zip
          done
          echo "OSS ZIP: https://cicy-1372193042-cn.oss-cn-shanghai.aliyuncs.com/cicy-mobile/cicy-${VER}.zip"
      # version.json (todo46 R2→OSS): primary copy on OSS — the worker
      # /version.json route reads OSS-first, R2-fallback. JSON isn't apk-banned so
      # it serves from the bare OSS domain. We ALSO mirror to R2 during migration:
      # installs ≤ the OTA that repoints appUpdate.ts still read the hardcoded R2
      # URL directly. Drop the R2 write once every install has OTA-converged.
      # Written LAST (after the zip is up) so the check never points at a missing file.
      - name: Write version.json → OSS (+ R2 mirror, migration)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Download URL points at the OSS zip (fast in CN, no domain binding).
          # `zip:true` tells the app the payload is a zip-wrapped APK (extract
          # before install). Field stays named `apk` for backward compat.
          OSS_ZIP="https://cicy-1372193042-cn.oss-cn-shanghai.aliyuncs.com/cicy-mobile/cicy-${VER}.zip"
          printf '{"version":"%s","apk":"%s","zip":true}' "$VER" "$OSS_ZIP" > version.json
          # Primary → OSS (signed curl, no ossutil binary)
          source scripts/oss-put.sh
          oss_put "cicy-mobile/version.json" version.json application/json
          # Migration mirror → R2 (old installs read the hardcoded R2 URL)
          base="https://api.cloudflare.com/client/v4/accounts/${R2_ACCOUNT_ID}/r2/buckets/cicy-assets-poc/objects"
          curl -fsS -X PUT "${base}/cicy-mobile/version.json" \
            -H "Authorization: Bearer ${R2_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @version.json >/dev/null
          echo "version.json → OSS + R2 (apk=${OSS_ZIP})"
      # Publish the SAME JS as an OTA update so devices already on this
      # runtime converge without reinstalling the APK.
      - name: Publish matching OTA update
        # publish-ota.mjs was migrated R2→OSS (signed PUT) by w-10036, so this
        # step now needs OSS creds, not R2. (ota.yml's copy was updated in tandem.)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          npx expo export -p android -p ios
          node scripts/publish-ota.mjs "${GITHUB_REF_NAME#v}"

  # ── iOS unsigned IPA → OSS (+ R2 mirror during migration) ────────────────────────────
  # Unsigned on purpose: Sideloadly / AltStore re-sign with the user's Apple ID
  # on install (free account = 7-day cert). Must build on macOS. NOTE: private-
  # repo macOS minutes bill at 10x — each run is expensive.
  ios:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: write # attach the IPA to the matching GitHub Release
    env:
      VER: ${{ github.event.inputs.ios_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Expo 55 / RN 0.83 native code (expo-modules-core) needs Xcode 16 /
      # Swift 6; macos-latest may default to an older Xcode → "unknown attribute
      # 'MainActor'" + actor-isolation errors. Pin the newest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install deps
        run: npm ci
      - name: Set version
        run: node scripts/sync-version.mjs "$VER" "${{ github.run_number }}"
      - name: Prebuild native iOS project
        run: npx expo prebuild -p ios --no-install
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build unsigned .app
        run: |
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WS" -list 2>/dev/null \
            | awk '/Schemes:/{f=1;next} f && NF {gsub(/^[[:space:]]+/,""); print; exit}')
          echo "workspace=$WS scheme=$SCHEME"
          xcodebuild -workspace "$WS" -scheme "$SCHEME" -configuration Release \
            -sdk iphoneos -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build
      - name: Package unsigned IPA
        run: |
          APP=$(ls -d ios/build/Build/Products/Release-iphoneos/*.app | head -1)
          echo "app=$APP"
          rm -rf Payload && mkdir -p Payload && cp -R "$APP" Payload/
          zip -qry "cicy-${VER}.ipa" Payload
          # Stable-name alias for releases/latest/download/cicy-latest.ipa.
          cp "cicy-${VER}.ipa" cicy-latest.ipa
          ls -lh cicy-*.ipa
      # Attach to the matching GitHub Release (created by the android tag-run).
      # softprops appends to the existing v<ver> release; glob grabs both the
      # versioned ipa and the latest alias.
      - name: Attach IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VER }}
          files: cicy-*.ipa
      # .ipa is NOT subject to OSS's apk block — upload raw to OSS (primary,
      # fast in CN), same cicy-mobile/ prefix + latest alias as the zip.
      - name: Upload IPA → OSS (+ R2 mirror, migration)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
        run: |
          # Signed curl (no ossutil binary — this job runs on a macOS runner
          # where the Linux ossutil64 can't execute). Same signer as the Android job.
          source scripts/oss-put.sh
          for key in "cicy-${VER}.ipa" "cicy-latest.ipa"; do
            oss_put "cicy-mobile/${key}" "cicy-${VER}.ipa" application/octet-stream
          done
          # Migration mirror → R2 (drop once fully on OSS)
          CT=application/octet-stream
          base="https://api.cloudflare.com/client/v4/accounts/${R2_ACCOUNT_ID}/r2/buckets/cicy-assets-poc/objects"
          for key in "cicy-mobile/cicy-${VER}.ipa" "cicy-mobile/cicy-latest.ipa"; do
            curl -fsS -X PUT "${base}/${key}" \
              -H "Authorization: Bearer ${R2_API_TOKEN}" \
              -H "Content-Type: ${CT}" \
              --data-binary @"cicy-${VER}.ipa" >/dev/null
          done
          echo "OSS IPA: https://cicy-1372193042-cn.oss-cn-shanghai.aliyuncs.com/cicy-mobile/cicy-${VER}.ipa"
