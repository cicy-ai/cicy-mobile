# Tag-driven release. Push a v* tag and this:
#   1. builds the web export and deploys the assets-only Worker
#      (telegram-bot.cicy-ai.com + workers.dev)  — the Telegram Mini App / PWA;
#   2. builds a release Android APK and attaches it to a GitHub Release.
#
#   git tag v1.0.1 && git push origin v1.0.1
#
# Version: app.json `expo.version` is set from the tag (v1.0.1 → 1.0.1) and
# android `versionCode` from the run number, so every release is monotonic.
#
# Secrets (repo → Settings → Secrets):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID   (web deploy)
# The Android APK is debug-signed (installable for sideload / Telegram). For an
# upgradable / Play Store signature see README → Release.
name: release

on:
  push:
    tags: ['v*']
  # iOS is manual-only for now: macOS minutes bill at 10x on a private repo and
  # the unsigned-IPA build is still being validated, so it shouldn't run on every
  # release tag yet. Trigger it from the Actions tab with a version string.
  workflow_dispatch:
    inputs:
      ios_version:
        description: iOS build version (e.g. 1.0.3)
        required: true
        default: 0.0.0-dev

jobs:
  # ── Telegram Mini App / PWA → Cloudflare ─────────────────────────────────────
  web:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Set version from tag
        run: node scripts/sync-version.mjs "${GITHUB_REF_NAME#v}" "${{ github.run_number }}"
      - name: Build web export
        run: npx expo export -p web
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
      - name: Verify live bundle matches build
        run: |
          LOCAL=$(ls dist/_expo/static/js/web/ | grep '^entry')
          LIVE=$(curl -s https://telegram-bot.cicy-ai.com/ | grep -o 'entry-[a-f0-9]*\.js' | head -1)
          echo "local=$LOCAL live=$LIVE"
          test "$LOCAL" = "$LIVE"

  # ── Android APK → GitHub Release ─────────────────────────────────────────────
  android:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload the APK
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install deps
        run: npm ci
      - name: Set version from tag
        run: node scripts/sync-version.mjs "${GITHUB_REF_NAME#v}" "${{ github.run_number }}"
      - name: Prebuild native android project
        run: npx expo prebuild -p android --no-install
      # The prebuilt template signs the release APK with the throwaway debug
      # keystore — installable for sideload / Telegram distribution. For an
      # upgradable / Play Store signature, add a release keystore + signingConfig
      # (see README → Release).
      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a,armeabi-v7a
      - name: Stage APK
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/release/app-release.apk "cicy-${VER}.apk"
          ls -lh cicy-*.apk
      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: cicy-*.apk
      # Public download — the repo is private, so the GitHub Release isn't
      # reachable without auth. Mirror the APK to the public R2 CDN
      # (r2.deepfetch.de5.net) under a versioned key + a stable `latest` alias.
      # R2 lives in a DIFFERENT Cloudflare account than Workers (the CLOUDFLARE_*
      # secrets), so it has its own R2_* creds. Upload via the R2 REST API
      # directly (same path cicy-r2 uses) — no wrangler account mismatch.
      - name: Upload APK to public R2 CDN
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          CT=application/vnd.android.package-archive
          base="https://api.cloudflare.com/client/v4/accounts/${R2_ACCOUNT_ID}/r2/buckets/cicy-assets-poc/objects"
          for key in "cicy-mobile/cicy-${VER}.apk" "cicy-mobile/cicy-latest.apk"; do
            curl -fsS -X PUT "${base}/${key}" \
              -H "Authorization: Bearer ${R2_API_TOKEN}" \
              -H "Content-Type: ${CT}" \
              --data-binary @"cicy-${VER}.apk" >/dev/null
          done
          # Version manifest LAST (after the APK is up) so the in-app update
          # check can never point at an APK that isn't there yet.
          printf '{"version":"%s","apk":"https://r2.deepfetch.de5.net/cicy-mobile/cicy-%s.apk"}' "$VER" "$VER" > version.json
          curl -fsS -X PUT "${base}/cicy-mobile/version.json" \
            -H "Authorization: Bearer ${R2_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @version.json >/dev/null
          echo "Public APK: https://r2.deepfetch.de5.net/cicy-mobile/cicy-${VER}.apk"
          echo "Latest:     https://r2.deepfetch.de5.net/cicy-mobile/cicy-latest.apk"
      # Publish the SAME JS as an OTA update so devices already on this
      # runtime converge without reinstalling the APK.
      - name: Publish matching OTA update
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
        run: |
          npx expo export -p android
          node scripts/publish-ota.mjs "${GITHUB_REF_NAME#v}"

  # ── iOS unsigned IPA → GitHub Release + public R2 ────────────────────────────
  # Unsigned on purpose: Sideloadly / AltStore re-sign with the user's Apple ID
  # on install (free account = 7-day cert). Must build on macOS. NOTE: private-
  # repo macOS minutes bill at 10x — each run is expensive.
  ios:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    env:
      VER: ${{ github.event.inputs.ios_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Expo 55 / RN 0.83 native code (expo-modules-core) needs Xcode 16 /
      # Swift 6; macos-latest may default to an older Xcode → "unknown attribute
      # 'MainActor'" + actor-isolation errors. Pin the newest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install deps
        run: npm ci
      - name: Set version
        run: node scripts/sync-version.mjs "$VER" "${{ github.run_number }}"
      - name: Prebuild native iOS project
        run: npx expo prebuild -p ios --no-install
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build unsigned .app
        run: |
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WS" -list 2>/dev/null \
            | awk '/Schemes:/{f=1;next} f && NF {gsub(/^[[:space:]]+/,""); print; exit}')
          echo "workspace=$WS scheme=$SCHEME"
          xcodebuild -workspace "$WS" -scheme "$SCHEME" -configuration Release \
            -sdk iphoneos -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build
      - name: Package unsigned IPA
        run: |
          APP=$(ls -d ios/build/Build/Products/Release-iphoneos/*.app | head -1)
          echo "app=$APP"
          rm -rf Payload && mkdir -p Payload && cp -R "$APP" Payload/
          zip -qry "cicy-${VER}.ipa" Payload
          ls -lh cicy-*.ipa
      - name: Upload IPA to public R2 CDN
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
        run: |
          CT=application/octet-stream
          base="https://api.cloudflare.com/client/v4/accounts/${R2_ACCOUNT_ID}/r2/buckets/cicy-assets-poc/objects"
          for key in "cicy-mobile/cicy-${VER}.ipa" "cicy-mobile/cicy-latest.ipa"; do
            curl -fsS -X PUT "${base}/${key}" \
              -H "Authorization: Bearer ${R2_API_TOKEN}" \
              -H "Content-Type: ${CT}" \
              --data-binary @"cicy-${VER}.ipa" >/dev/null
          done
          echo "Public IPA: https://r2.deepfetch.de5.net/cicy-mobile/cicy-${VER}.ipa"
          echo "Latest:     https://r2.deepfetch.de5.net/cicy-mobile/cicy-latest.ipa"
